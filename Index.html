<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Traffic Management - Experiment 2</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <h2>Smart Traffic Management System</h2>
    
    <div id="video-container">
        <video id="vid" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div class="sensor-line"></div>
    </div>

    <div class="traffic-light">
        <div id="red" class="light active-red"></div>
        <div id="green" class="light"></div>
    </div>

    <h3 id="signal-text">STATUS: RED (WAITING)</h3>
    <div id="log">Initializing AI Sensor...</div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="Script.js"></script>
</body>
</html>
