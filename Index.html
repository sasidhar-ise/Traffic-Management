<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Traffic Control System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="system-container">
        <h2>Smart City: AI Traffic Sensor</h2>
        
        <div class="viewport">
            <video id="webcam" autoplay playsinline></video>
            <div class="scanner-bar"></div>
        </div>

        <div class="signal-post">
            <div id="stop-light" class="light red active"></div>
            <div id="go-light" class="light green"></div>
        </div>

        <div class="display-panel">
            <h1 id="instruction">STOP</h1>
            <div id="ai-status">Initializing AI Engine...</div>
        </div>
    </div>

    <canvas id="proc-canvas" style="display:none;"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
